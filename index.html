<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目门户</title>
<style>
/* ════════════════════════════════════════════════
   主题变量
════════════════════════════════════════════════ */
:root,[data-theme="dark"] {
  --bg:        #0d1117; --bg2:       #0f1923; --surface:   #161b22;
  --surface2:  #1e2430; --border:    #30363d; --border2:   #21262d;
  --accent:    #58a6ff; --accent2:   #3fb950; --accent3:   #f78166; --accent4: #d29922;
  --text:      #e6edf3; --text2:     #8b949e; --text3:     #6e7681;
  --radius:    12px;    --shadow:    0 8px 32px rgba(0,0,0,.5);
  --login-bg:  radial-gradient(ellipse at 60% 40%, #0d1b2a, #070c14);
}
[data-theme="light"] {
  --bg:#f6f8fa; --bg2:#eef1f5; --surface:#ffffff; --surface2:#f0f4f8;
  --border:#d0d7de; --border2:#e1e4e8;
  --accent:#0969da; --accent2:#1a7f37; --accent3:#cf222e; --accent4:#9a6700;
  --text:#1f2328; --text2:#57606a; --text3:#8c959f;
  --shadow:0 4px 16px rgba(0,0,0,.12);
  --login-bg: radial-gradient(ellipse at 60% 40%, #dce8f5, #c8dff0);
}
[data-theme="corporate"] {
  --bg:#0a1628; --bg2:#0c1e36; --surface:#0f2040; --surface2:#0d1b32;
  --border:#1a3a6e; --border2:#0f2a50;
  --accent:#4d9fff; --accent2:#2ea44f; --accent3:#f85149; --accent4:#e3b341;
  --text:#e8f0fe; --text2:#8ba3c8; --text3:#6a88aa;
  --shadow:0 8px 32px rgba(0,0,0,.6);
  --login-bg: radial-gradient(ellipse at 60% 40%, #071020, #030810);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s;}

/* ════════════════════════════════════════════════
   登录页
════════════════════════════════════════════════ */
#login-overlay{position:fixed;inset:0;z-index:9999;background:var(--login-bg);display:flex;align-items:center;justify-content:center;}
#login-overlay.hidden{display:none;}
.login-card{width:400px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:44px 40px 36px;box-shadow:var(--shadow),0 0 80px rgba(88,166,255,.05);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .licon{width:56px;height:56px;background:linear-gradient(135deg,#1c3a6e,#1a6e3a);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:12px;}
.login-logo h1{font-size:20px;font-weight:700;letter-spacing:.02em;}
.login-logo p{font-size:12px;color:var(--text2);margin-top:4px;}
.lf{margin-bottom:14px;}
.lf label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;}
.lf input{width:100%;padding:10px 13px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s;}
.lf input:focus{border-color:var(--accent);}
.login-btn{width:100%;padding:11px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;transition:opacity .2s,transform .1s;}
.login-btn:hover{opacity:.88;} .login-btn:active{transform:scale(.98);}
.login-err{background:rgba(247,129,102,.1);border:1px solid rgba(247,129,102,.3);border-radius:7px;padding:8px 11px;font-size:13px;color:var(--accent3);margin-top:10px;display:none;}
.login-err.show{display:block;}
.theme-switcher-login{display:flex;justify-content:center;gap:8px;margin-top:18px;}
.tsb{background:transparent;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--text2);cursor:pointer;transition:all .2s;}
.tsb:hover,.tsb.active{border-color:var(--accent);color:var(--accent);}

/* ════════════════════════════════════════════════
   主布局
════════════════════════════════════════════════ */
#app{display:none;flex-direction:column;min-height:100vh;} #app.visible{display:flex;}

/* ── 顶栏 ── */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;gap:12px;}
.h-left{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.h-logo{width:32px;height:32px;background:linear-gradient(135deg,#1c3a6e,#1a6e3a);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.h-title{font-size:15px;font-weight:700;}
.h-sub{font-size:11px;color:var(--text2);}
.h-nav{display:flex;gap:2px;flex:1;justify-content:center;}
.nav-btn{padding:5px 14px;background:transparent;border:none;border-radius:7px;color:var(--text2);font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.nav-btn:hover{background:var(--surface2);color:var(--text);}
.nav-btn.active{background:rgba(88,166,255,.12);color:var(--accent);}
.h-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.user-chip{display:flex;align-items:center;gap:7px;padding:4px 10px 4px 6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:border-color .2s;position:relative;}
.user-chip:hover{border-color:var(--accent);}
.u-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
.u-name{font-size:12px;color:var(--text2);}
.u-role{font-size:10px;color:var(--accent4);}
/* 用户下拉 */
.user-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;min-width:150px;box-shadow:var(--shadow);display:none;z-index:300;}
.user-dropdown.show{display:block;}
.ud-item{padding:9px 14px;font-size:13px;color:var(--text2);cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:8px;border-radius:8px;margin:3px;}
.ud-item:hover{background:var(--surface2);color:var(--text);}
.ud-divider{height:1px;background:var(--border);margin:3px 0;}

/* ── 侧边栏（管理面板） ── */
.sidebar-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.5);display:none;}
.sidebar-overlay.show{display:block;}
.sidebar{position:fixed;right:0;top:0;bottom:0;width:480px;max-width:95vw;background:var(--surface);border-left:1px solid var(--border);z-index:301;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s cubic-bezier(.22,.68,0,1.2);}
.sidebar.show{transform:none;}
.sb-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.sb-header h3{font-size:15px;font-weight:700;}
.sb-close{background:transparent;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:2px 6px;border-radius:5px;}
.sb-close:hover{color:var(--text);}
.sb-body{flex:1;overflow-y:auto;padding:16px 20px;}
.sb-section{margin-bottom:24px;}
.sb-section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}

/* 用户列表 */
.user-row{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.ur-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.ur-info{display:flex;align-items:center;gap:9px;}
.ur-actions{display:flex;gap:6px;}
.icon-btn{background:transparent;border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--text2);cursor:pointer;transition:all .15s;}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);}
.icon-btn.danger:hover{border-color:var(--accent3);color:var(--accent3);}
.perm-grid{display:flex;flex-wrap:wrap;gap:6px;}
.perm-chip{font-size:11px;padding:2px 9px;border-radius:12px;cursor:pointer;transition:all .15s;user-select:none;border:1px solid var(--border);color:var(--text2);}
.perm-chip.on{background:rgba(88,166,255,.15);border-color:rgba(88,166,255,.4);color:var(--accent);}
/* 添加用户表单 */
.add-user-form{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.form-row{display:flex;gap:8px;margin-bottom:8px;}
.form-row input,.form-row select{flex:1;padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;outline:none;}
.form-row input:focus,.form-row select:focus{border-color:var(--accent);}
.form-actions{display:flex;gap:8px;}
.btn-primary{padding:7px 16px;background:var(--accent);border:none;border-radius:7px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.btn-primary:hover{opacity:.85;}
.btn-secondary{padding:7px 14px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:13px;cursor:pointer;transition:all .15s;}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}

/* 主题面板 */
.theme-panel{display:flex;gap:8px;flex-wrap:wrap;}
.theme-btn{padding:7px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;}
.theme-btn:hover,.theme-btn.active{border-color:var(--accent);color:var(--text);}

/* ── 主内容 ── */
main{flex:1;padding:28px 24px;max-width:1400px;margin:0 auto;width:100%;}
.page-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
.page-hd h2{font-size:22px;font-weight:700;}
.page-hd-right{display:flex;align-items:center;gap:10px;}

/* 统计条 */
.stats-bar{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;}
.stat-chip{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 16px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);}
.stat-chip strong{color:var(--text);font-size:16px;font-weight:700;}

/* 视图切换 */
.view-switcher{display:flex;gap:2px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:3px;}
.view-btn{background:transparent;border:none;color:var(--text2);padding:5px 10px;border-radius:6px;cursor:pointer;transition:all .15s;font-size:14px;}
.view-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.2);}

/* ── 卡片视图 ── */
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
.project-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:border-color .2s,transform .2s,box-shadow .2s;position:relative;overflow:hidden;cursor:default;}
.project-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--card-color,var(--accent));opacity:0;transition:opacity .2s;}
.project-card:hover{border-color:var(--card-color,var(--accent));transform:translateY(-2px);box-shadow:0 10px 36px rgba(0,0,0,.35);}
.project-card:hover::before{opacity:1;}
.card-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.card-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.card-badges{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;letter-spacing:.03em;}
.badge-live{background:rgba(63,185,80,.15);color:var(--accent2);border:1px solid rgba(63,185,80,.3);}
.badge-private{background:rgba(247,129,102,.1);color:var(--accent3);border:1px solid rgba(247,129,102,.3);}
.badge-public{background:rgba(88,166,255,.1);color:var(--accent);border:1px solid rgba(88,166,255,.3);}
.badge-admin{background:rgba(210,153,34,.12);color:var(--accent4);border:1px solid rgba(210,153,34,.3);}
.card-title{font-size:15px;font-weight:700;margin:8px 0 5px;}
.card-desc{font-size:12px;color:var(--text2);line-height:1.6;min-height:36px;}
.card-footer{margin-top:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.visit-btn{flex:1;min-width:100px;padding:8px 14px;border:none;border-radius:7px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:5px;transition:opacity .2s;background:var(--card-color,var(--accent));}
.visit-btn:hover{opacity:.84;}
.visit-btn.locked{background:var(--surface2);border:1px solid var(--border);color:var(--text2);}
.gh-btn{padding:8px 10px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:11px;text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:border-color .15s,color .15s;white-space:nowrap;}
.gh-btn:hover{border-color:var(--accent);color:var(--accent);}

/* 访问控制开关 */
.auth-toggle{display:flex;align-items:center;gap:6px;}
.toggle-label{font-size:10px;color:var(--text3);white-space:nowrap;}
.toggle-sw{position:relative;width:34px;height:19px;cursor:pointer;display:inline-block;}
.toggle-sw input{opacity:0;width:0;height:0;position:absolute;}
.toggle-track{position:absolute;inset:0;background:var(--border);border-radius:19px;transition:background .2s;}
.toggle-sw input:checked + .toggle-track{background:var(--accent2);}
.toggle-thumb{position:absolute;top:3px;left:3px;width:13px;height:13px;background:#fff;border-radius:50%;transition:transform .2s;pointer-events:none;}
.toggle-sw input:checked ~ .toggle-thumb{transform:translateX(15px);}

/* ── 列表视图 ── */
.projects-list{display:flex;flex-direction:column;gap:8px;}
.project-list-row{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:14px;transition:border-color .2s;}
.project-list-row:hover{border-color:var(--card-color,var(--accent));}
.lr-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.lr-info{flex:1;min-width:0;}
.lr-name{font-size:14px;font-weight:600;}
.lr-desc{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lr-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}

/* ── 表格视图 ── */
.projects-table{width:100%;border-collapse:collapse;}
.projects-table th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);background:var(--surface);}
.projects-table td{padding:12px 14px;border-bottom:1px solid var(--border2);font-size:13px;vertical-align:middle;}
.projects-table tr:last-child td{border-bottom:none;}
.projects-table tr:hover td{background:var(--surface2);}
.t-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}

/* ── 无权限提示 ── */
.no-access{text-align:center;padding:60px 20px;color:var(--text2);}
.no-access .na-icon{font-size:40px;margin-bottom:12px;}

/* footer */
footer{text-align:center;padding:16px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);}
footer a{color:var(--text3);text-decoration:none;}

/* 响应式 */
@media(max-width:640px){
  header{padding:0 12px;}.h-nav{display:none;} main{padding:16px;}
  .projects-grid{grid-template-columns:1fr;} .sidebar{width:100%;max-width:100vw;}
}
</style>
</head>
<body>

<!-- ═══════════ 登录 ═══════════ -->
<div id="login-overlay">
  <div class="login-card">
    <div class="login-logo">
      <div class="licon">🏠</div>
      <h1>项目门户</h1>
      <p>Projects Portal</p>
    </div>
    <div class="lf"><label>用户名</label><input type="text" id="l-user" placeholder="请输入用户名" autocomplete="username"/></div>
    <div class="lf"><label>密码</label><input type="password" id="l-pass" placeholder="请输入密码" autocomplete="current-password"/></div>
    <button class="login-btn" onclick="doLogin()">登 录</button>
    <div class="login-err" id="l-err"></div>
    <div class="theme-switcher-login">
      <button class="tsb active" onclick="setTheme('dark',this)">🌑 暗黑</button>
      <button class="tsb" onclick="setTheme('light',this)">☀️ 亮白</button>
      <button class="tsb" onclick="setTheme('corporate',this)">🔵 商务</button>
    </div>
  </div>
</div>

<!-- ═══════════ 管理侧边栏 ═══════════ -->
<div class="sidebar-overlay" id="sb-overlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="sb-header">
    <h3 id="sb-title">⚙️ 系统管理</h3>
    <button class="sb-close" onclick="closeSidebar()">✕</button>
  </div>
  <div class="sb-body" id="sb-body"><!-- 动态渲染 --></div>
</div>

<!-- ═══════════ 主应用 ═══════════ -->
<div id="app">
  <header>
    <div class="h-left">
      <div class="h-logo">🏠</div>
      <div><div class="h-title">项目门户</div><div class="h-sub">Projects Portal</div></div>
    </div>
    <div class="h-nav">
      <button class="nav-btn active" onclick="switchTab('projects',this)">📦 项目列表</button>
      <button class="nav-btn" id="btn-users" onclick="switchTab('admin',this)" style="display:none">👤 用户管理</button>
    </div>
    <div class="h-right">
      <!-- 主题切换 -->
      <div style="display:flex;gap:3px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:2px;">
        <button class="view-btn active" onclick="setTheme('dark',this)" title="暗黑">🌑</button>
        <button class="view-btn" onclick="setTheme('light',this)" title="亮白">☀️</button>
        <button class="view-btn" onclick="setTheme('corporate',this)" title="商务">🔵</button>
      </div>
      <div class="user-chip" onclick="toggleUserDropdown()">
        <div class="u-avatar" id="u-avatar" style="background:linear-gradient(135deg,#2563eb,#16a34a)">S</div>
        <div><div class="u-name" id="u-name">songhw</div><div class="u-role" id="u-role">管理员</div></div>
        <span style="color:var(--text3);font-size:10px;">▾</span>
        <div class="user-dropdown" id="user-dropdown">
          <div class="ud-item" onclick="openSidebar('profile')">👤 个人信息</div>
          <div class="ud-item" onclick="openSidebar('changepwd')">🔑 修改密码</div>
          <div class="ud-divider"></div>
          <div class="ud-item" onclick="doLogout()">🚪 退出登录</div>
        </div>
      </div>
    </div>
  </header>

  <main>
    <!-- 项目列表页 -->
    <div id="tab-projects">
      <div class="page-hd">
        <h2 id="page-title">📦 我的项目清单</h2>
        <div class="page-hd-right">
          <div class="view-switcher">
            <button class="view-btn active" onclick="setView('grid',this)" title="卡片视图">⊞</button>
            <button class="view-btn" onclick="setView('list',this)" title="列表视图">☰</button>
            <button class="view-btn" onclick="setView('table',this)" title="表格视图">⊟</button>
          </div>
          <button class="btn-secondary" onclick="openSidebar('authctrl')" id="btn-authctrl" style="display:none">🛡 访问控制</button>
        </div>
      </div>
      <div class="stats-bar" id="stats-bar"></div>
      <div id="projects-container"></div>
    </div>

    <!-- 用户管理页（管理员可管理所有用户，普通用户可查看列表和编辑自己） -->
    <div id="tab-admin" style="display:none">
      <div class="page-hd"><h2>👤 用户管理</h2></div>
      <div id="admin-panel"><!-- 动态渲染 --></div>
    </div>
  </main>

  <footer>&copy; 2026 Projects Portal &nbsp;·&nbsp; <a href="https://github.com/songhonglu" target="_blank">GitHub</a></footer>
</div>

<script>
/* ══════════════════════════════════════════════════════
   ① 数据定义
══════════════════════════════════════════════════════ */

// 项目列表
const PROJECTS = [
  { id:'contractmap',       name:'合同数字化平台集成全景图', desc:'浙江省机电集团合同数字化平台·系统集成全景图 v2.0，可视化呈现各系统集成关系与数据流转。', icon:'🗺️', iconBg:'rgba(88,166,255,.15)', color:'#58a6ff', github:'https://github.com/songhonglu/contractmap',       live:'https://songhonglu.github.io/contractmap/',       hasPages:true,  defaultAuth:true  },

/* ══════════════════════════════════════════════════════
   ② 用户体系（localStorage 持久化）
   用户数据结构：{ id, username, displayName, passwordHash, role, projectPerms, avatar, email, phone }
   role: 'admin' | 'user'
   projectPerms: ['contractmap','huarongdao-game',...]  (null = 全部)
══════════════════════════════════════════════════════ */
const DB_KEY  = 'portal_db_v2';
const SES_KEY = 'portal_session';
const TOKEN   = 'portal_v1_2026';   // 跨域传递用的固定 token

function loadDB() {
  try { return JSON.parse(localStorage.getItem(DB_KEY) || 'null'); } catch { return null; }
}
function saveDB(db) { localStorage.setItem(DB_KEY, JSON.stringify(db)); }

// 初始化数据库（仅在首次访问时执行，后续直接读取数据库）
// 使用 _initialized 标记避免重复初始化
let _dbInitialized = false;

async function initDB() {
  // 如果已经初始化过，直接返回
  if (_dbInitialized) {
    return getDB();
  }
  
  let db = loadDB();
  
  // 严格检查：只有当 db 为 null 或没有 users 数组时才初始化
  if (!db || !db.users || !Array.isArray(db.users) || db.users.length === 0) {
    console.log('首次初始化数据库...');
    const adminHash = await sha256('songhw:Seeyon@JD');
    const chenptHash = await sha256('chenpt:123456');
    db = {
      users: [
        {
          id: 'user_admin',
          username: 'songhw',
          displayName: '宋老师',
          passwordHash: adminHash,
          role: 'admin',
          projectPerms: null,
          avatar: '#2563eb',
          email: '',
          phone: '',
        },
        {
          id: 'user_chenpt',
          username: 'chenpt',
          displayName: '陈鹏涛',
          passwordHash: chenptHash,
          role: 'user',
          projectPerms: [],  // 默认无权限，需管理员手动授权
          avatar: '#16a34a',
          email: '',
          phone: '',
        }
      ],
      authCtrl: { contractmap: true, 'huarongdao-game': false, amberk: true, 'number-huarongdao': false },
      theme: 'dark',
    };
    saveDB(db);
  } else {
    console.log('数据库已存在，跳过初始化');
  }
  
  _dbInitialized = true;
  return db;
}

function getDB() { return loadDB() || { users:[], authCtrl:{}, theme:'dark' }; }

async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

/* ══════════════════════════════════════════════════════
   ③ 认证
══════════════════════════════════════════════════════ */
let currentUser = null;

async function doLogin() {
  const username = document.getElementById('l-user').value.trim();
  const password = document.getElementById('l-pass').value;
  if (!username || !password) { showLoginErr('请输入用户名和密码'); return; }

  await initDB();  // 确保数据库已初始化
  const db = getDB();
  const hash = await sha256(username + ':' + password);
  const user = db.users.find(u => u.username === username && u.passwordHash === hash);

  if (user) {
    currentUser = user;
    const sesData = { uid: user.id, username: user.username, token: TOKEN, ts: Date.now(), ttl: 8 * 60 * 60 * 1000 };
    // sessionStorage 存门户自身的会话（刷新页面恢复状态）
    sessionStorage.setItem(SES_KEY, JSON.stringify(sesData));
    // localStorage 写入跨子项目认证标记（portal-auth.js 读取用，同 origin 共享）
    try { localStorage.setItem('portal_auth_session', JSON.stringify(sesData)); } catch(e) {}
    
    // 检查是否有子门户跳转来的 redirect 参数
    try {
      const redirect = sessionStorage.getItem('portal_redirect');
      if (redirect) {
        sessionStorage.removeItem('portal_redirect');
        // 跳转回子门户
        window.location.href = redirect;
        return;
      }
    } catch(e) {}
    
    showApp(user);
  } else {
    showLoginErr('用户名或密码错误，请重试');
    document.getElementById('l-pass').value = '';
  }
}

function doLogout() {
  currentUser = null;
  sessionStorage.removeItem(SES_KEY);
  try { localStorage.removeItem('portal_auth_session'); } catch(e) {}
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-overlay').classList.remove('hidden');
  document.getElementById('l-pass').value = '';
  document.getElementById('l-user').value = '';
  closeUserDropdown();
}

function restoreSession() {
  try {
    const ses = JSON.parse(sessionStorage.getItem(SES_KEY) || 'null');
    if (!ses || ses.token !== TOKEN) return null;
    const db = getDB();
    const user = db.users.find(u => u.id === ses.uid) || null;
    if (user) {
      // 刷新 localStorage 中的跨子项目认证标记（延续有效期）
      const fresh = { uid: user.id, username: user.username, token: TOKEN, ts: Date.now(), ttl: 8 * 60 * 60 * 1000 };
      try { localStorage.setItem('portal_auth_session', JSON.stringify(fresh)); } catch(e) {}
    }
    return user;
  } catch { return null; }
}

// 刷新当前用户信息（从数据库读取最新数据）
function refreshCurrentUser() {
  if (!currentUser) return;
  const db = getDB();
  const latestUser = db.users.find(u => u.id === currentUser.id);
  if (latestUser) {
    currentUser.displayName = latestUser.displayName;
    currentUser.email = latestUser.email;
    currentUser.phone = latestUser.phone;
    currentUser.projectPerms = latestUser.projectPerms;
    currentUser.avatar = latestUser.avatar;
    // 更新页面显示
    document.getElementById('u-name').textContent = currentUser.displayName || currentUser.username;
  }
}

function showLoginErr(msg) {
  const el = document.getElementById('l-err');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3500);
}

/* ══════════════════════════════════════════════════════
   ④ 主题
══════════════════════════════════════════════════════ */
function setTheme(t, btn) {
  document.documentElement.setAttribute('data-theme', t);
  // 更新按钮状态（登录页和主页都有主题按钮）
  document.querySelectorAll('.tsb,.view-btn[onclick*="setTheme"]').forEach(b => {
    b.classList.toggle('active', b === btn || (b.getAttribute('onclick')||'').includes(`'${t}'`));
  });
  // 持久化
  const db = getDB(); db.theme = t; saveDB(db);
}

function applyStoredTheme() {
  const db = getDB();
  const t = db.theme || 'dark';
  document.documentElement.setAttribute('data-theme', t);
}

/* ══════════════════════════════════════════════════════
   ⑤ 访问子项目（安全跳转：token 不经过 URL，通过 localStorage 传递）
══════════════════════════════════════════════════════ */
function visitProject(projId) {
  const proj = PROJECTS.find(p => p.id === projId);
  if (!proj || !proj.live) return;

  // 刷新一次跨子项目授权标记（确保 localStorage 中的 token 是最新的）
  try {
    const sesData = { uid: currentUser.id, username: currentUser.username, token: TOKEN, ts: Date.now(), ttl: 8 * 60 * 60 * 1000 };
    localStorage.setItem('portal_auth_session', JSON.stringify(sesData));
  } catch(e) {}

  // 直接在新标签页打开，portal-auth.js 会在子项目页面自动校验
  window.open(proj.live, '_blank');
}

/* ══════════════════════════════════════════════════════
   ⑥ 视图与渲染
══════════════════════════════════════════════════════ */
let currentView = 'grid';

function setView(v, btn) {
  currentView = v;
  document.querySelectorAll('.view-switcher .view-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderProjects();
}

function getUserProjects() {
  if (!currentUser) return [];
  // 每次都从数据库读取最新权限，确保管理员修改后立即生效
  const db = getDB();
  const latestUser = db.users.find(u => u.id === currentUser.id);
  if (!latestUser) return [];
  
  // 更新 currentUser 的权限（同步最新数据）
  currentUser.projectPerms = latestUser.projectPerms;
  
  if (latestUser.role === 'admin' || latestUser.projectPerms === null) return PROJECTS;
  return PROJECTS.filter(p => (latestUser.projectPerms || []).includes(p.id));
}

function renderProjects() {
  const container = document.getElementById('projects-container');
  const projects = getUserProjects();
  const db = getDB();

  if (projects.length === 0) {
    container.innerHTML = `<div class="no-access"><div class="na-icon">🔒</div><p>您没有任何项目的访问权限，请联系管理员</p></div>`;
    return;
  }

  if (currentView === 'grid') {
    container.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = 'projects-grid';
    projects.forEach(proj => grid.appendChild(makeCard(proj, db)));
    container.appendChild(grid);
  } else if (currentView === 'list') {
    container.innerHTML = '';
    const list = document.createElement('div');
    list.className = 'projects-list';
    projects.forEach(proj => list.appendChild(makeListRow(proj, db)));
    container.appendChild(list);
  } else if (currentView === 'table') {
    renderTable(projects, db, container);
  }

  updateStats(projects, db);
}

function makeCard(proj, db) {
  const authOn = (proj.id in db.authCtrl) ? db.authCtrl[proj.id] : proj.defaultAuth;
  const canVisit = proj.hasPages && proj.live;
  const isAdmin = currentUser && currentUser.role === 'admin';

  const card = document.createElement('div');
  card.className = 'project-card';
  card.style.setProperty('--card-color', proj.color);

  card.innerHTML = `
    <div class="card-hd">
      <div class="card-icon" style="background:${proj.iconBg}">${proj.icon}</div>
      <div class="card-badges">
        ${proj.hasPages ? '<span class="badge badge-live">● 已上线</span>' : ''}
        ${authOn ? '<span class="badge badge-private">🔒 需认证</span>' : '<span class="badge badge-public">🌐 公开</span>'}
      </div>
    </div>
    <div class="card-title">${proj.name}</div>
    <div class="card-desc">${proj.desc}</div>
    <div class="card-footer">
      ${canVisit
        ? `<button class="visit-btn" style="background:${proj.color}" onclick="visitProject('${proj.id}')">🚀 访问项目</button>`
        : `<span class="visit-btn locked">⏳ 暂未上线</span>`
      }
      <a class="gh-btn" href="${proj.github}" target="_blank">${ghIcon()} GitHub</a>
      ${isAdmin ? `
        <div class="auth-toggle" title="控制此项目是否需要门户认证后才能访问">
          <span class="toggle-label">访问控制</span>
          <label class="toggle-sw">
            <input type="checkbox" ${authOn?'checked':''} onchange="toggleAuth('${proj.id}',this.checked)">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
        </div>` : ''}
    </div>`;
  return card;
}

function makeListRow(proj, db) {
  const authOn = (proj.id in db.authCtrl) ? db.authCtrl[proj.id] : proj.defaultAuth;
  const canVisit = proj.hasPages && proj.live;
  const isAdmin = currentUser && currentUser.role === 'admin';

  const row = document.createElement('div');
  row.className = 'project-list-row';
  row.style.setProperty('--card-color', proj.color);
  row.innerHTML = `
    <div class="lr-icon" style="background:${proj.iconBg}">${proj.icon}</div>
    <div class="lr-info">
      <div class="lr-name">${proj.name} ${authOn?'<span class="badge badge-private" style="vertical-align:middle">🔒</span>':'<span class="badge badge-public" style="vertical-align:middle">🌐</span>'}</div>
      <div class="lr-desc">${proj.desc}</div>
    </div>
    <div class="lr-actions">
      ${canVisit
        ? `<button class="visit-btn" style="background:${proj.color};min-width:80px" onclick="visitProject('${proj.id}')">🚀 访问</button>`
        : `<span class="visit-btn locked" style="min-width:80px">⏳ 未上线</span>`
      }
      <a class="gh-btn" href="${proj.github}" target="_blank">${ghIcon()}</a>
      ${isAdmin ? `
        <label class="toggle-sw" title="访问控制">
          <input type="checkbox" ${authOn?'checked':''} onchange="toggleAuth('${proj.id}',this.checked)">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>` : ''}
    </div>`;
  return row;
}

function renderTable(projects, db, container) {
  const isAdmin = currentUser && currentUser.role === 'admin';
  let rows = projects.map(proj => {
    const authOn = (proj.id in db.authCtrl) ? db.authCtrl[proj.id] : proj.defaultAuth;
    const canVisit = proj.hasPages && proj.live;
    return `<tr>
      <td><span style="font-size:18px">${proj.icon}</span></td>
      <td><strong>${proj.name}</strong></td>
      <td style="color:var(--text2);max-width:240px">${proj.desc.substring(0,40)}…</td>
      <td>${proj.hasPages ? '<span class="badge badge-live">已上线</span>' : '<span style="color:var(--text3);font-size:11px">未上线</span>'}</td>
      <td>${authOn ? '<span class="badge badge-private">需认证</span>' : '<span class="badge badge-public">公开</span>'}</td>
      <td>
        ${canVisit
          ? `<button class="visit-btn" style="background:${proj.color};min-width:70px;padding:6px 10px;font-size:11px" onclick="visitProject('${proj.id}')">🚀 访问</button>`
          : `<span style="color:var(--text3);font-size:11px">暂未上线</span>`
        }
      </td>
      ${isAdmin ? `<td>
        <label class="toggle-sw" title="访问控制">
          <input type="checkbox" ${authOn?'checked':''} onchange="toggleAuth('${proj.id}',this.checked)">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </td>` : ''}
    </tr>`;
  }).join('');

  container.innerHTML = `
    <div class="t-wrap">
      <table class="projects-table">
        <thead><tr>
          <th></th><th>项目名称</th><th>简介</th><th>状态</th><th>访问</th><th>操作</th>
          ${isAdmin ? '<th>访问控制</th>' : ''}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function updateStats(projects, db) {
  const total = projects.length;
  const live = projects.filter(p => p.hasPages).length;
  const authCount = projects.filter(p => (p.id in db.authCtrl) ? db.authCtrl[p.id] : p.defaultAuth).length;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-chip"><strong>${total}</strong> 个项目</div>
    <div class="stat-chip"><strong>${live}</strong> 个已上线</div>
    <div class="stat-chip"><strong>${authCount}</strong> 个需认证</div>`;
}

function toggleAuth(projId, enabled) {
  // 权限检查：只有管理员可以切换访问控制
  if (!currentUser || currentUser.role !== 'admin') {
    alert('无权修改访问控制设置');
    return;
  }
  
  const db = getDB();
  db.authCtrl[projId] = enabled;
  saveDB(db);
  renderProjects();
}

// 当前编辑的用户ID
let editingUserId = null;

// 打开用户编辑弹窗（管理员用）
function openUserEditModal(uid) {
  // 权限检查：只有管理员可以编辑用户
  if (!currentUser || currentUser.role !== 'admin') {
    console.warn('无权编辑用户');
    return;
  }
  
  const db = getDB();
  const user = db.users.find(u => u.id === uid);
  if (!user) return;
  
  editingUserId = uid;
  
  // 预填充用户信息（保留原有信息方便对比）
  document.getElementById('edit-displayName').value = user.displayName || '';
  document.getElementById('edit-email').value = user.email || '';
  document.getElementById('edit-phone').value = user.phone || '';
  
  // 渲染项目权限选择（管理员显示全部项目，普通用户显示其有权限的项目）
  let perms;
  if (user.role === 'admin') {
    // 管理员默认拥有所有权限
    perms = PROJECTS.map(p => p.id);
  } else {
    // 普通用户：null表示全部权限，数组表示具体权限
    perms = user.projectPerms === null ? PROJECTS.map(p => p.id) : (user.projectPerms || []);
  }
  
  // 保存当前权限状态到全局变量，用于后续对比
  window._editUserOriginalPerms = [...perms];
  window._editUserOriginalInfo = {
    displayName: user.displayName || '',
    email: user.email || '',
    phone: user.phone || ''
  };
  
  const permChips = PROJECTS.map(p => `
    <span class="perm-chip ${perms.includes(p.id)?'on':''}" onclick="toggleEditPerm('${p.id}')" style="cursor:pointer;${user.role==='admin'?'opacity:0.5;pointer-events:none;':''}">
      ${p.icon} ${p.name}
    </span>
  `).join('');
  document.getElementById('edit-perms').innerHTML = permChips;
  
  // 如果是管理员，添加提示
  if (user.role === 'admin') {
    document.getElementById('edit-perms').innerHTML += '<div style="width:100%;margin-top:8px;font-size:11px;color:var(--text3);">管理员自动拥有所有项目权限</div>';
  }
  
  document.getElementById('user-edit-modal').style.display = 'flex';
}

// 关闭用户编辑弹窗
function closeUserEditModal() {
  document.getElementById('user-edit-modal').style.display = 'none';
  editingUserId = null;
}

// 切换编辑弹窗中的权限（允许空数组）
function toggleEditPerm(projId) {
  // 权限检查
  if (!currentUser || currentUser.role !== 'admin') {
    console.warn('无权修改权限');
    return;
  }
  
  const db = getDB();
  const user = db.users.find(u => u.id === editingUserId);
  if (!user || user.role === 'admin') {
    console.log('toggleEditPerm: 用户不存在或是管理员');
    return;
  }
  
  // 确保 projectPerms 是数组（不是 null）
  if (user.projectPerms === null) user.projectPerms = [];
  
  const idx = user.projectPerms.indexOf(projId);
  if (idx >= 0) {
    user.projectPerms.splice(idx, 1); // 取消授权
    console.log('取消授权:', projId, '当前权限:', user.projectPerms);
  } else {
    user.projectPerms.push(projId); // 添加授权
    console.log('添加授权:', projId, '当前权限:', user.projectPerms);
  }
  
  // 立即保存到数据库（确保数据不丢失）
  saveDB(db);
  
  // 重新渲染权限选择
  const perms = user.projectPerms;
  const permChips = PROJECTS.map(p => `
    <span class="perm-chip ${perms.includes(p.id)?'on':''}" onclick="toggleEditPerm('${p.id}')" style="cursor:pointer;">
      ${p.icon} ${p.name}
    </span>
  `).join('');
  document.getElementById('edit-perms').innerHTML = permChips;
}

// 保存用户编辑（管理员用）
function saveUserEdit() {
  // 权限检查：只有管理员可以保存用户编辑
  if (!currentUser || currentUser.role !== 'admin') {
    alert('无权保存用户信息');
    return;
  }
  
  const displayName = document.getElementById('edit-displayName').value.trim();
  const email = document.getElementById('edit-email').value.trim();
  const phone = document.getElementById('edit-phone').value.trim();
  
  if (!displayName) {
    alert('显示名称不能为空');
    return;
  }
  if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    alert('邮箱格式不正确');
    return;
  }
  if (phone && !/^1[3-9]\d{9}$/.test(phone)) {
    alert('手机号格式不正确');
    return;
  }
  
  const db = getDB();
  const user = db.users.find(u => u.id === editingUserId);
  if (!user) {
    alert('用户不存在');
    return;
  }
  
  // 对比并记录变更
  const changes = [];
  if (user.displayName !== displayName) changes.push(`显示名: "${user.displayName}" → "${displayName}"`);
  if (user.email !== email) changes.push(`邮箱: "${user.email || '-'}" → "${email || '-'}"`);
  if (user.phone !== phone) changes.push(`手机: "${user.phone || '-'}" → "${phone || '-'}"`);
  
  // 保存所有修改（包括projectPerms，它已经在toggleEditPerm中实时修改了）
  user.displayName = displayName;
  user.email = email;
  user.phone = phone;
  // 确保projectPerms是数组（普通用户）
  if (user.role !== 'admin' && user.projectPerms === null) user.projectPerms = [];
  
  console.log('保存用户:', user.username, 'projectPerms:', user.projectPerms);
  
  saveDB(db);
  
  // 验证保存是否成功
  const verifyDb = getDB();
  const verifyUser = verifyDb.users.find(u => u.id === editingUserId);
  console.log('验证保存:', verifyUser.username, 'projectPerms:', verifyUser.projectPerms);
  
  // 如果修改的是当前登录用户，同步更新 currentUser
  if (currentUser && currentUser.id === editingUserId) {
    currentUser.displayName = displayName;
    currentUser.email = email;
    currentUser.phone = phone;
    currentUser.projectPerms = user.projectPerms;
    // 刷新页面顶部显示
    document.getElementById('u-name').textContent = displayName;
    // 刷新项目列表（权限可能已变更）
    renderProjects();
  }
  
  closeUserEditModal();
  renderAdminPanel();
  
  // 显示变更摘要
  if (changes.length > 0) {
    alert(`用户信息已保存\n\n变更内容：\n${changes.join('\n')}`);
  } else {
    alert('用户信息已保存（无变更）');
  }
}

// 普通用户更新自己的信息
function updateSelfInfo() {
  const email = document.getElementById('self-email').value.trim();
  const phone = document.getElementById('self-phone').value.trim();
  
  if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    alert('邮箱格式不正确');

  }
  if (phone && !/^1[3-9]\d{9}$/.test(phone)) {
    alert('手机号格式不正确');
    return;
  }
  
  const db = getDB();
  const user = db.users.find(u => u.id === currentUser.id);

  user.email = email;
  user.phone = phone;

  currentUser.email = email;

function togglePerm(uid, projId) {

async function addUser() {
  // 权限检查：只有管理员可以添加用户
  if (!currentUser || currentUser.role !== 'admin') {
    alert('无权添加用户');
    return;
  }
  
  const username = document.getElementById('new-user').value.trim();
  const display = document.getElementById('new-display').value.trim();
  const pass = document.getElementById('new-pass').value;
  const role = document.getElementById('new-role').value;
  if (!username || !pass) { alert('用户名和密码不能为空'); return; }
  if (!/^[a-zA-Z0-9_-]{2,20}$/.test(username)) { alert('用户名只能包含字母、数字、下划线，2-20字符'); return; }
  const db = getDB();
  if (db.users.find(u => u.username === username)) { alert('用户名已存在'); return; }
  const hash = await sha256(username + ':' + pass);
  const colors = ['#2563eb','#16a34a','#7c3aed','#db2777','#ea580c'];
  db.users.push({
    id: 'user_' + Date.now(),
    username, displayName: display || username,
    passwordHash: hash, role,
    projectPerms: role === 'admin' ? null : [],  // 普通用户默认无权限（空数组）
    avatar: colors[Math.floor(Math.random()*colors.length)],
    email: '',
    phone: ''
  });
  saveDB(db);
  renderAdminPanel();
  document.getElementById('new-user').value = '';
  document.getElementById('new-display').value = '';
  document.getElementById('new-pass').value = '';
  alert(`用户 "${username}" 已创建成功`);
}

async function resetPassword(uid) {
  // 权限检查：只有管理员可以重置密码
  if (!currentUser || currentUser.role !== 'admin') {
    alert('无权重置密码');
    return;
  }
  
  const newPass = prompt('请输入新密码（至少6位）：');
  if (!newPass || newPass.length < 6) { alert('密码不能少于6位'); return; }
  const db = getDB();
  const user = db.users.find(u => u.id === uid);
  if (!user) return;
  user.passwordHash = await sha256(user.username + ':' + newPass);
  saveDB(db);
  alert(`用户 "${user.username}" 的密码已重置成功`);
}

function deleteUser(uid) {
  // 权限检查：只有管理员可以删除用户
  if (!currentUser || currentUser.role !== 'admin') {
    alert('无权删除用户');
    return;
  }
  
  const db = getDB();
  const user = db.users.find(u => u.id === uid);
  if (!user) return;
  
  if (!confirm(`确定要删除用户 "${user.username}" 吗？\n\n此操作不可撤销！`)) return;
  
  db.users = db.users.filter(u => u.id !== uid);
  saveDB(db);
  renderAdminPanel();
  alert(`用户 "${user.username}" 已删除`);
}

        <div class="lf"><label>确认新密码</label><input type="password" id="cp-confirm" placeholder="再次输入新密码"/></div>
        <button class="btn-primary" onclick="changePassword()">确认修改</button>
        <div id="cp-msg" style="margin-top:10px;font-size:12px;color:var(--accent2);display:none"></div>
      </div>`;
  }
}

async function changePassword() {
  const old = document.getElementById('cp-old').value;
  const np = document.getElementById('cp-new').value;
  const nc = document.getElementById('cp-confirm').value;
  const msg = document.getElementById('cp-msg');
  if (!old||!np) { alert('请填写所有字段'); return; }
  if (np.length < 6) { alert('新密码至少6位'); return; }
  if (np !== nc) { alert('两次密码不一致'); return; }
  const db = getDB();
  const user = db.users.find(u => u.id === currentUser.id);
  const oldHash = await sha256(user.username + ':' + old);
  if (oldHash !== user.passwordHash) { alert('当前密码错误'); return; }
  user.passwordHash = await sha256(user.username + ':' + np);
  saveDB(db);
  msg.style.display = 'block';
  msg.textContent = '✅ 密码已成功修改';
  setTimeout(() => { msg.style.display='none'; closeSidebar(); }, 1500);
}

// 更新个人信息（邮箱、手机号）
function updateProfileInfo() {
  const email = document.getElementById('profile-email').value.trim();
  const phone = document.getElementById('profile-phone').value.trim();
  
  // 简单验证
  if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    alert('邮箱格式不正确');
    return;
  }
  if (phone && !/^1[3-9]\d{9}$/.test(phone)) {
    alert('手机号格式不正确（请输入11位手机号）');
    return;
  }
  
  const db = getDB();
  const user = db.users.find(u => u.id === currentUser.id);
  if (!user) return;
  
  user.email = email;
  user.phone = phone;
  saveDB(db);
  
  // 更新 currentUser
  currentUser.email = email;
  currentUser.phone = phone;
  
  alert('✅ 联系信息已保存');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('show');
  document.getElementById('sb-overlay').classList.remove('show');
}

/* ══════════════════════════════════════════════════════
   ⑨ 标签页切换
══════════════════════════════════════════════════════ */
function switchTab(tab, btn) {
  // 权限检查：非管理员不能访问 admin 标签页
  if (tab === 'admin' && (!currentUser || currentUser.role !== 'admin')) {
    console.warn('无权访问用户管理页面');
    return;
  }
  
  document.querySelectorAll('.h-nav .nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('tab-projects').style.display = tab==='projects' ? '' : 'none';
  document.getElementById('tab-admin').style.display = tab==='admin' ? '' : 'none';
  if (tab === 'admin') {
    // 刷新当前用户信息（确保显示最新数据）
    refreshCurrentUser();
    renderAdminPanel();
  }
  if (tab === 'projects') {
    // 刷新用户信息和项目列表
    refreshCurrentUser();
    renderProjects();
  }
}

/* ══════════════════════════════════════════════════════
   ⑩ 用户下拉菜单
══════════════════════════════════════════════════════ */
function toggleUserDropdown() {
  document.getElementById('user-dropdown').classList.toggle('show');
}
function closeUserDropdown() {
  document.getElementById('user-dropdown').classList.remove('show');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.user-chip')) closeUserDropdown();
});

/* ══════════════════════════════════════════════════════
   ⑪ 显示主 App
══════════════════════════════════════════════════════ */
function showApp(user) {
  document.getElementById('login-overlay').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  
  // 重置到项目列表标签页（防止上一个用户的标签页状态残留）
  document.getElementById('tab-projects').style.display = '';
  document.getElementById('tab-admin').style.display = 'none';
  document.querySelectorAll('.h-nav .nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.h-nav .nav-btn[onclick*="projects"]').classList.add('active');
  
  // 设置用户信息
  document.getElementById('u-name').textContent = user.displayName || user.username;
  document.getElementById('u-avatar').textContent = user.username[0].toUpperCase();
  document.getElementById('u-avatar').style.background = user.avatar || 'linear-gradient(135deg,#2563eb,#16a34a)';
  document.getElementById('u-role').textContent = user.role === 'admin' ? '👑 管理员' : '👤 普通用户';
  
  // 管理员显示额外功能
  const isAdmin = user.role === 'admin';
  document.getElementById('btn-authctrl').style.display = isAdmin ? '' : 'none';
  document.getElementById('btn-users').style.display = isAdmin ? '' : 'none';
  
  renderProjects();
}

/* ══════════════════════════════════════════════════════
   ⑫ 初始化
══════════════════════════════════════════════════════ */
(async function init() {
  // 先初始化数据库
  await initDB();
  // 应用主题
  applyStoredTheme();
  // Enter 键提交
  ['l-user','l-pass'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  });
  // 恢复会话
  const user = restoreSession();
  if (user) {
    currentUser = user;
    showApp(user);
  }
})();
</script>
</body>
