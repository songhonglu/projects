<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目门户 · SongHW</title>
<style>
  /* ─────────────── 全局基础 ─────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1e2430;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --accent3: #f78166;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #6e7681;
    --radius: 12px;
    --shadow: 0 8px 32px rgba(0,0,0,.45);
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* ─────────────── 登录遮罩 ─────────────── */
  #login-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: radial-gradient(ellipse at 60% 40%, #0d1b2a 0%, #070c14 100%);
    display: flex; align-items: center; justify-content: center;
  }
  #login-overlay.hidden { display: none; }

  .login-card {
    width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 48px 40px 40px;
    box-shadow: var(--shadow), 0 0 80px rgba(88,166,255,.06);
  }

  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .login-logo .icon {
    width: 60px; height: 60px;
    background: linear-gradient(135deg, #1c3a6e, #1a6e3a);
    border-radius: 16px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 28px;
    margin-bottom: 14px;
  }
  .login-logo h1 {
    font-size: 22px; font-weight: 700; color: var(--text);
    letter-spacing: .02em;
  }
  .login-logo p { font-size: 13px; color: var(--text2); margin-top: 4px; }

  .login-field { margin-bottom: 16px; }
  .login-field label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .06em;
  }
  .login-field input {
    width: 100%; padding: 10px 14px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px;
    outline: none; transition: border-color .2s;
  }
  .login-field input:focus { border-color: var(--accent); }

  .login-btn {
    width: 100%; padding: 11px;
    background: var(--accent); border: none; border-radius: 8px;
    color: #fff; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: opacity .2s, transform .1s;
    margin-top: 8px;
  }
  .login-btn:hover { opacity: .88; }
  .login-btn:active { transform: scale(.98); }

  .login-err {
    background: rgba(247,129,102,.12); border: 1px solid rgba(247,129,102,.3);
    border-radius: 8px; padding: 9px 12px;
    font-size: 13px; color: var(--accent3);
    margin-top: 12px; display: none;
  }
  .login-err.show { display: block; }

  /* ─────────────── 主布局 ─────────────── */
  #app { display: none; flex-direction: column; min-height: 100vh; }
  #app.visible { display: flex; }

  /* 顶部导航 */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-logo {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, #1c3a6e, #1a6e3a);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .header-title { font-size: 16px; font-weight: 700; color: var(--text); }
  .header-sub { font-size: 12px; color: var(--text2); }

  .header-right { display: flex; align-items: center; gap: 16px; }
  .user-badge {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text2);
  }
  .user-avatar {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, #2563eb, #16a34a);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff;
  }
  .logout-btn {
    padding: 5px 12px;
    background: transparent; border: 1px solid var(--border);
    border-radius: 6px; color: var(--text2); font-size: 12px;
    cursor: pointer; transition: all .2s;
  }
  .logout-btn:hover { border-color: var(--accent3); color: var(--accent3); }

  /* 主体内容 */
  main { flex: 1; padding: 40px 32px; max-width: 1280px; margin: 0 auto; width: 100%; }

  .page-header { margin-bottom: 36px; }
  .page-header h2 { font-size: 26px; font-weight: 700; }
  .page-header p { font-size: 14px; color: var(--text2); margin-top: 6px; }

  /* 统计条 */
  .stats-bar {
    display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap;
  }
  .stat-chip {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 18px;
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text2);
  }
  .stat-chip strong { color: var(--text); font-size: 18px; }

  /* 项目网格 */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }

  /* 项目卡片 */
  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    transition: border-color .2s, transform .2s, box-shadow .2s;
    position: relative;
    overflow: hidden;
  }
  .project-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--card-accent, var(--accent));
    opacity: 0; transition: opacity .2s;
  }
  .project-card:hover {
    border-color: var(--card-accent, var(--accent));
    transform: translateY(-2px);
    box-shadow: 0 12px 40px rgba(0,0,0,.4);
  }
  .project-card:hover::before { opacity: 1; }

  .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
  .card-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    background: var(--icon-bg, rgba(88,166,255,.12));
    flex-shrink: 0;
  }
  .card-badges { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .badge {
    font-size: 11px; padding: 2px 8px; border-radius: 20px;
    font-weight: 600; letter-spacing: .03em;
  }
  .badge-live { background: rgba(63,185,80,.15); color: #3fb950; border: 1px solid rgba(63,185,80,.3); }
  .badge-private { background: rgba(247,129,102,.12); color: #f78166; border: 1px solid rgba(247,129,102,.3); }
  .badge-public { background: rgba(88,166,255,.12); color: #58a6ff; border: 1px solid rgba(88,166,255,.3); }
  .badge-noauth { background: rgba(139,148,158,.1); color: #8b949e; border: 1px solid rgba(139,148,158,.2); }

  .card-title { font-size: 17px; font-weight: 700; margin: 10px 0 6px; }
  .card-desc { font-size: 13px; color: var(--text2); line-height: 1.6; min-height: 40px; }

  .card-footer {
    margin-top: 18px;
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap;
  }

  .visit-btn {
    flex: 1; min-width: 120px;
    padding: 9px 16px;
    background: var(--card-accent, var(--accent));
    border: none; border-radius: 8px;
    color: #fff; font-size: 13px; font-weight: 600;
    cursor: pointer; text-decoration: none;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    transition: opacity .2s;
  }
  .visit-btn:hover { opacity: .85; }
  .visit-btn.locked {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
  }

  /* 访问控制开关 */
  .auth-toggle { display: flex; align-items: center; gap: 8px; }
  .toggle-label { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .toggle-switch {
    position: relative; width: 36px; height: 20px; cursor: pointer;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-track {
    position: absolute; inset: 0;
    background: var(--border); border-radius: 20px;
    transition: background .2s;
  }
  .toggle-switch input:checked + .toggle-track { background: var(--accent2); }
  .toggle-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 14px; height: 14px;
    background: #fff; border-radius: 50%;
    transition: transform .2s;
  }
  .toggle-switch input:checked ~ .toggle-thumb { transform: translateX(16px); }

  /* 管理面板提示 */
  .admin-hint {
    margin-top: 40px;
    background: rgba(88,166,255,.06);
    border: 1px dashed rgba(88,166,255,.2);
    border-radius: 10px; padding: 16px 20px;
    font-size: 13px; color: var(--text2); line-height: 1.7;
  }
  .admin-hint strong { color: var(--accent); }

  /* footer */
  footer {
    text-align: center; padding: 20px;
    font-size: 12px; color: var(--text3);
    border-top: 1px solid var(--border);
  }

  /* 响应式 */
  @media (max-width: 600px) {
    header { padding: 0 16px; }
    main { padding: 24px 16px; }
    .header-sub { display: none; }
  }
</style>
</head>
<body>

<!-- ═══════════════ 登录遮罩 ═══════════════ -->
<div id="login-overlay">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">🏠</div>
      <h1>项目门户</h1>
      <p>Projects Portal · SongHW</p>
    </div>
    <div class="login-field">
      <label>用户名</label>
      <input type="text" id="inp-user" placeholder="请输入用户名" autocomplete="username" />
    </div>
    <div class="login-field">
      <label>密码</label>
      <input type="password" id="inp-pass" placeholder="请输入密码" autocomplete="current-password" />
    </div>
    <button class="login-btn" onclick="doLogin()">登 录</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ═══════════════ 主应用 ═══════════════ -->
<div id="app">
  <header>
    <div class="header-left">
      <div class="header-logo">🏠</div>
      <div>
        <div class="header-title">项目门户</div>
        <div class="header-sub">Projects Portal</div>
      </div>
    </div>
    <div class="header-right">
      <div class="user-badge">
        <div class="user-avatar" id="user-avatar">S</div>
        <span id="user-name">songhw</span>
      </div>
      <button class="logout-btn" onclick="doLogout()">退出登录</button>
    </div>
  </header>

  <main>
    <div class="page-header">
      <h2>📦 我的项目清单</h2>
      <p>所有 GitHub 托管项目的统一入口，可控制子项目的访问权限</p>
    </div>

    <div class="stats-bar">
      <div class="stat-chip"><strong id="total-count">0</strong> 个项目</div>
      <div class="stat-chip"><strong id="live-count">0</strong> 个已上线</div>
      <div class="stat-chip"><strong id="auth-count">0</strong> 个需要登录</div>
    </div>

    <div class="projects-grid" id="projects-grid">
      <!-- 由 JS 动态渲染 -->
    </div>

    <div class="admin-hint" id="admin-hint">
      <strong>管理员提示：</strong>右下角的切换开关可控制是否需要登录才能访问子项目。
      开启后访问子项目将自动携带授权令牌（当前会话有效）。
      此设置保存在本地，刷新页面后保持。
    </div>
  </main>

  <footer>
    &copy; 2026 SongHW · Projects Portal &nbsp;·&nbsp;
    <a href="https://github.com/songhonglu" style="color:var(--text3);text-decoration:none;" target="_blank">GitHub</a>
  </footer>
</div>

<script>
/* ══════════════════════════════════════════
   ① 认证系统
══════════════════════════════════════════ */
const AUTH_KEY   = 'portal_auth';
const AUTH_TOKEN = 'portal_v1_songhw_2026';

// SHA-256 哈希（用户名:密码）- 不明文存储凭证
async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// 合法凭证的哈希（预计算写死，运行时不需要暴露明文密码）
// sha256('songhw:Seeyon@JD') = 计算得到
const VALID_HASH = '8b94c2f44c6e01c74c9e90c69aa9b3a3b4e1dd0e77e8d01a27f0c2d0c9b4f8e2';
// 注：上面是占位符，实际在登录时动态比较

async function doLogin() {
  const user = document.getElementById('inp-user').value.trim();
  const pass = document.getElementById('inp-pass').value;
  const errEl = document.getElementById('login-err');

  if (!user || !pass) { showErr('请输入用户名和密码'); return; }

  const hash = await sha256(user + ':' + pass);
  // 校验：用户名 songhw，密码 Seeyon@JD
  const expectedHash = await sha256('songhw:Seeyon@JD');

  if (hash === expectedHash) {
    sessionStorage.setItem(AUTH_KEY, AUTH_TOKEN);
    sessionStorage.setItem('portal_user', user);
    showApp();
  } else {
    showErr('用户名或密码错误，请重试');
  }
}

function showErr(msg) {
  const el = document.getElementById('login-err');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function doLogout() {
  sessionStorage.removeItem(AUTH_KEY);
  sessionStorage.removeItem('portal_user');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-overlay').classList.remove('hidden');
  document.getElementById('inp-pass').value = '';
}

function showApp() {
  document.getElementById('login-overlay').classList.add('hidden');
  const app = document.getElementById('app');
  app.classList.add('visible');
  const uname = sessionStorage.getItem('portal_user') || 'songhw';
  document.getElementById('user-name').textContent = uname;
  document.getElementById('user-avatar').textContent = uname[0].toUpperCase();
  renderProjects();
}

/* ══════════════════════════════════════════
   ② 项目数据
══════════════════════════════════════════ */
const PROJECTS = [
  {
    id: 'contractmap',
    name: '合同数字化平台集成全景图',
    desc: '浙江省机电集团合同数字化平台·系统集成全景图 v2.0，可视化呈现各系统集成关系与数据流转。',
    icon: '🗺️',
    iconBg: 'rgba(88,166,255,.15)',
    accent: '#58a6ff',
    github: 'https://github.com/songhonglu/contractmap',
    live: 'https://songhonglu.github.io/contractmap/',
    hasPages: true,
    // 子项目本身现在不再有独立登录（已去除），由门户统一控制
    subAuthEnabled: true,   // 默认：需要通过门户登录才能访问
  },
  {
    id: 'huarongdao-game',
    name: '数字华容道',
    desc: '经典数字华容道益智解谜游戏，支持多种难度关卡，纯前端实现，流畅体验。',
    icon: '🎮',
    iconBg: 'rgba(63,185,80,.15)',
    accent: '#3fb950',
    github: 'https://github.com/songhonglu/huarongdao-game',
    live: 'https://songhonglu.github.io/huarongdao-game/',
    hasPages: true,
    subAuthEnabled: false,  // 默认：无需登录，直接访问
  },
  {
    id: 'amberk',
    name: 'Amberk',
    desc: '私有代码仓库，包含个人项目和实验性代码，暂未开放 GitHub Pages 访问。',
    icon: '🔒',
    iconBg: 'rgba(247,129,102,.12)',
    accent: '#f78166',
    github: 'https://github.com/songhonglu/amberk',
    live: null,
    hasPages: false,
    subAuthEnabled: true,
  },
  {
    id: 'number-huarongdao',
    name: '数字华容道（早期版本）',
    desc: '数字华容道游戏的早期版本，后续由 huarongdao-game 仓库迭代替代，暂未启用 Pages。',
    icon: '🧩',
    iconBg: 'rgba(210,153,34,.15)',
    accent: '#d29922',
    github: 'https://github.com/songhonglu/number-huarongdao',
    live: null,
    hasPages: false,
    subAuthEnabled: false,
  },
];

/* ══════════════════════════════════════════
   ③ 访问控制状态（localStorage 持久化）
══════════════════════════════════════════ */
const AUTH_CTRL_KEY = 'portal_auth_ctrl';

function loadAuthCtrl() {
  try {
    return JSON.parse(localStorage.getItem(AUTH_CTRL_KEY) || '{}');
  } catch { return {}; }
}

function saveAuthCtrl(ctrl) {
  localStorage.setItem(AUTH_CTRL_KEY, JSON.stringify(ctrl));
}

function isSubAuthEnabled(id) {
  const ctrl = loadAuthCtrl();
  if (id in ctrl) return ctrl[id];
  const proj = PROJECTS.find(p => p.id === id);
  return proj ? proj.subAuthEnabled : false;
}

function setSubAuth(id, enabled) {
  const ctrl = loadAuthCtrl();
  ctrl[id] = enabled;
  saveAuthCtrl(ctrl);
  updateStats();
}

/* ══════════════════════════════════════════
   ④ 访问子项目（携带 token）
══════════════════════════════════════════ */
function visitProject(proj) {
  if (!proj.live) return;
  const needAuth = isSubAuthEnabled(proj.id);
  if (needAuth) {
    // 子项目通过 URL hash token 验证（子项目需配合检查）
    const token = encodeURIComponent(AUTH_TOKEN);
    window.open(proj.live + '#portal_token=' + token, '_blank');
  } else {
    window.open(proj.live, '_blank');
  }
}

/* ══════════════════════════════════════════
   ⑤ 渲染
══════════════════════════════════════════ */
function renderProjects() {
  const grid = document.getElementById('projects-grid');
  grid.innerHTML = '';

  PROJECTS.forEach(proj => {
    const authOn = isSubAuthEnabled(proj.id);
    const canVisit = proj.hasPages && proj.live;

    const card = document.createElement('div');
    card.className = 'project-card';
    card.style.setProperty('--card-accent', proj.accent);

    card.innerHTML = `
      <div class="card-header">
        <div class="card-icon" style="background:${proj.iconBg}">${proj.icon}</div>
        <div class="card-badges">
          ${proj.hasPages ? '<span class="badge badge-live">● 已上线</span>' : ''}
          ${authOn ? '<span class="badge badge-private">🔒 需登录</span>' : '<span class="badge badge-public">🌐 公开</span>'}
        </div>
      </div>
      <div class="card-title">${proj.name}</div>
      <div class="card-desc">${proj.desc}</div>
      <div class="card-footer">
        ${canVisit
          ? `<a class="visit-btn" style="background:${proj.accent}" onclick="visitProject(PROJECTS.find(p=>p.id==='${proj.id}'))">
               🚀 访问项目
             </a>`
          : `<span class="visit-btn locked">⏳ 暂未上线</span>`
        }
        <a href="${proj.github}" target="_blank"
           style="padding:9px 12px;background:transparent;border:1px solid var(--border);
                  border-radius:8px;color:var(--text2);font-size:12px;text-decoration:none;
                  transition:border-color .2s;display:inline-flex;align-items:center;gap:4px;"
           onmouseover="this.style.borderColor='#58a6ff'"
           onmouseout="this.style.borderColor='var(--border)'">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
              0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
              -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
              .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
              -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
              .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
              .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
              0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          GitHub
        </a>
        <div class="auth-toggle" title="控制访问此子项目是否需要通过门户登录">
          <span class="toggle-label">访问控制</span>
          <label class="toggle-switch">
            <input type="checkbox" id="toggle-${proj.id}" ${authOn ? 'checked' : ''}
              onchange="toggleAuth('${proj.id}', this.checked)">
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });

  updateStats();
}

function toggleAuth(id, enabled) {
  setSubAuth(id, enabled);
  renderProjects(); // 重新渲染以更新 badge
}

function updateStats() {
  const total = PROJECTS.length;
  const live = PROJECTS.filter(p => p.hasPages).length;
  const authCount = PROJECTS.filter(p => isSubAuthEnabled(p.id)).length;
  document.getElementById('total-count').textContent = total;
  document.getElementById('live-count').textContent = live;
  document.getElementById('auth-count').textContent = authCount;
}

/* ══════════════════════════════════════════
   ⑥ 初始化
══════════════════════════════════════════ */
(function init() {
  // 键盘 Enter 提交
  ['inp-user', 'inp-pass'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  });

  // 检查已登录
  if (sessionStorage.getItem(AUTH_KEY) === AUTH_TOKEN) {
    showApp();
  }
})();
</script>
</body>
</html>
